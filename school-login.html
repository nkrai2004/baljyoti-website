<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
     
<title>BJPS-OS Staff Login</title>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Source Sans 3',sans-serif;

background:linear-gradient(135deg,#5d0b1d,#8d112d);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.login-box{

width:420px;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 20px 60px rgba(0,0,0,.25);

text-align:center;

}

.logo{

width:90px;

margin-bottom:15px;

}

h1{

font-family:Fraunces;

color:#6E0B1E;

margin-bottom:10px;

}

p{

color:#666;

margin-bottom:30px;

}

.google{

width:100%;

padding:15px;

border:1px solid #ddd;

border-radius:10px;

background:white;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

.google:hover{

background:#f5f5f5;

}

.google img{

width:22px;

vertical-align:middle;

margin-right:10px;

}

.note{

margin-top:25px;

font-size:14px;

color:#777;

}

footer{

margin-top:25px;

font-size:13px;

color:#999;

}

</style>

</head>

<body>

<div class="login-box">

<img src="logo.png" class="logo">

<h1>BJPS Operating System</h1>

<p>Staff & Teachers Portal</p>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<div id="g_id_onload"
     data-client_id="449862246796-bm23j5sna6gk1uj3o0krtoqlsfjmfq44.apps.googleusercontent.com"
     data-context="signin"
     data-ux_mode="popup"
     data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin"
     data-type="standard"
     data-theme="filled_blue"
     data-size="large"
     data-text="continue_with"
     data-shape="pill">
</div>
     <script>
function handleCredentialResponse(response) {

    // For now just verify that Google returned a credential
    console.log(response);

    alert("Google Login Successful!");

}
</script>

<div class="note">

Only <b>@baljyoti.com</b> accounts are permitted.

</div>

<footer>

Bal Jyoti Public School<br>

Established 1987

</footer>

</div>

</body>

</html>
