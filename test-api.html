<!DOCTYPE html>
<html>
<head>
    <title>BJPS-OS API Test</title>
</head>
<body>

<h2>BJPS-OS API Test</h2>

<button onclick="testAPI()">Connect API</button>

<pre id="result">Waiting...</pre>

<script>

const API = "https://script.google.com/macros/s/AKfycbwrjrKfbMkfso3LhiDmCwmZTt0gO0LfWWJAz8DWW3g2DiVmedrIASvvRNS_2guAMXZ_/exec";

async function testAPI() {

    const response = await fetch(API);

    const data = await response.json();

    document.getElementById("result").textContent =
        JSON.stringify(data, null, 4);

}

</script>

</body>
</html>
